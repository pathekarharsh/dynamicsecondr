<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Diagnostics</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            padding-top: 4rem;
        }
        .dashboard { 
            background: #1e293b; 
            padding: 2rem; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .metric-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 0.75rem 0; 
            border-bottom: 1px solid #334155; 
        }
        .metric-row:last-child { border-bottom: none; }
        .label { color: #94a3b8; font-weight: 500; }
        .value { font-family: monospace; font-size: 1.1rem; color: #38bdf8; }
        .status-connected { color: #22c55e; }
        .status-failed { color: #ef4444; }
        .status-none { color: #f59e0b; }
        .error { color: #ef4444; text-align: center; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2 style="margin-top: 0; border-bottom: 2px solid #3b82f6; padding-bottom: 0.5rem;">Azure Node Instance</h2>
        <div id="metrics-container">
            <div class="metric-row"><span class="label">Status</span><span class="value">Initializing...</span></div>
        </div>
    </div>

    <script>
        const formatBytes = (bytes) => (bytes / (1024 ** 3)).toFixed(2) + ' GB';
        
        const getDbStatusClass = (status) => {
            if (status === 'Connected') return 'status-connected';
            if (status === 'Connection Failed') return 'status-failed';
            return 'status-none';
        };

        async function fetchMetrics() {
            const container = document.getElementById('metrics-container');
            
            try {
                const response = await fetch('/api/metrics');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                container.innerHTML = `
                    <div class="metric-row"><span class="label">OS Platform</span><span class="value">${data.platform}</span></div>
                    <div class="metric-row"><span class="label">Memory (Free)</span><span class="value">${formatBytes(data.freemem)} / ${formatBytes(data.totalmem)}</span></div>
                    <div class="metric-row"><span class="label">Uptime</span><span class="value">${Math.floor(data.uptime)}s</span></div>
                    <div class="metric-row">
                        <span class="label">Database</span>
                        <span class="value ${getDbStatusClass(data.database)}">${data.database}</span>
                    </div>
                `;
            } catch (error) {
                console.error('Polling error:', error);
                container.innerHTML = `<div class="error">Connection to server lost. Retrying...</div>`;
            }
        }

        fetchMetrics();
        setInterval(fetchMetrics, 3000);
    </script>

</body>
</html>
